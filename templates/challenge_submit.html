<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit to {{ challenge.title }} - NeuralArt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .navbar { background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .navbar-brand { font-family: 'Orbitron', sans-serif; font-weight: 700; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .submit-card { background: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
    .submit-card:hover { border-color: rgba(129,140,248,0.5); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .submit-card img { width: 100%; height: 200px; object-fit: cover; }
    .submit-card .info { padding: 0.8rem 1rem; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #818cf8; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}"><i class="fas fa-brain me-2"></i>NeuralArt</a>
    </div>
</nav>

<div class="container" style="padding-top:7rem;">
    <h3 class="orbitron mb-2"><i class="fas fa-upload me-2"></i>Submit to Challenge</h3>
    <p class="text-muted mb-4">{{ challenge.title }} — Choose one of your public artworks to submit.</p>

    <div class="row g-3">
        {% for t in transfers %}
        <div class="col-lg-3 col-md-4 col-6">
            <form action="{{ url_for('confirm_challenge_submission', challenge_id=challenge.id, transfer_id=t.id) }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="submit-card w-100 text-start border-0 bg-transparent p-0">
                    <img src="{{ url_for('send_image', filename=t.result_image) }}" alt="Artwork">
                    <div class="info">
                        <div style="font-size:0.85rem;font-weight:600;">{{ t.result_image[:30] }}...</div>
                        <div style="font-size:0.72rem;color:#64748b;">{{ t.created_at.strftime('%d %b %Y') }}</div>
                    </div>
                </button>
            </form>
        </div>
        {% endfor %}
    </div>

    <div class="text-center mt-4 mb-5">
        <a href="{{ url_for('challenge_detail', challenge_id=challenge.id) }}" class="btn btn-outline-light rounded-pill px-4"><i class="fas fa-arrow-left me-1"></i>Back</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
