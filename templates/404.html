<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - NeuralArt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .card { background: rgba(30,41,59,0.85); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 3rem; text-align: center; max-width: 480px; }
    .code { font-family: 'Orbitron', sans-serif; font-size: 6rem; font-weight: 700; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
</style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <h4 class="orbitron mt-3" style="color:#a855f7;">Page Not Found</h4>
        <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-5 mt-3">
            <i class="fas fa-home me-2"></i>Go Home
        </a>
    </div>
</body>
</html>
