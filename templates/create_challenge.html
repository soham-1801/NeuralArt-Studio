<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Challenge - NeuralArt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .navbar { background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .navbar-brand { font-family: 'Orbitron', sans-serif; font-weight: 700; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .form-card { background: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 2rem; }
    .form-control, .form-select { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; }
    .form-control:focus, .form-select:focus { background: rgba(15,23,42,0.9); border-color: #818cf8; color: #e2e8f0; box-shadow: 0 0 0 0.2rem rgba(129,140,248,0.25); }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}"><i class="fas fa-brain me-2"></i>NeuralArt</a>
    </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div style="position: fixed; top: 80px; left: 0; right: 0; z-index: 1050; padding: 0 15px;">
    {% for category, message in messages %}
      <div class="alert alert-{{ category or 'info' }} alert-dismissible fade show shadow" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="container" style="padding-top:7rem; max-width:600px;">
    <h3 class="orbitron mb-4"><i class="fas fa-plus-circle me-2"></i>Create Challenge</h3>
    <div class="form-card">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Abstract Dreamscape" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Describe the challenge theme and rules..." required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Theme / Style Prompt</label>
                <input type="text" name="theme" class="form-control" placeholder="e.g. Surreal, Neon, Cyberpunk" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Duration (days)</label>
                <select name="days" class="form-select">
                    <option value="3">3 days</option>
                    <option value="5">5 days</option>
                    <option value="7" selected>7 days</option>
                    <option value="14">14 days</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2"><i class="fas fa-rocket me-1"></i>Create Challenge</button>
        </form>
    </div>
    <div class="text-center mt-4 mb-5">
        <a href="{{ url_for('challenges') }}" class="btn btn-outline-light rounded-pill px-4"><i class="fas fa-arrow-left me-1"></i>Back</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
