<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - NeuralArt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #450a0a 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .result-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: 20px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .fail-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 12px;
            padding: 14px;
            color: #fecaca;
            margin: 20px 0;
            font-size: 0.92rem;
        }
        .btn-retry {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            margin-right: 10px;
        }
        .btn-retry:hover { color: white; opacity: 0.92; }
        .btn-outline-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-outline-link:hover { color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="result-card">
        <div class="fail-icon"><i class="fas fa-times"></i></div>
        <h2 class="orbitron text-white mb-2">Payment Failed</h2>
        <p class="text-muted">We couldn't process your payment. Please try again.</p>

        <div class="error-box">
            <i class="fas fa-exclamation-circle me-1"></i>
            {{ payment.message or 'Payment was declined by the gateway.' }}
        </div>

        <p class="text-muted small mb-4">
            Reference: <strong class="text-white">{{ payment.transaction_id }}</strong>
        </p>

        <div>
            <a href="{{ url_for('checkout', plan=payment.plan) }}" class="btn btn-retry">
                <i class="fas fa-redo me-1"></i> Try Again
            </a>
        </div>
        <div class="mt-3">
            <a href="{{ url_for('index') }}#pricing" class="btn-outline-link">Back to pricing</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
